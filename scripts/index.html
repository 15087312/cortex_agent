<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>示例页面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Hello, World!</h1>
        <p class="subtitle">一个简洁的前端页面示例</p>

        <h2>关于本页</h2>
        <p>
            这是一个使用 HTML5 和 CSS3 构建的示例页面，展示了基本的网页结构。
            页面采用卡片式布局，包含标题、段落、列表等常见元素。
        </p>

        <h2>特性清单</h2>
        <ul>
            <li>完整的 HTML5 文档骨架</li>
            <li>内嵌 CSS 样式，含渐变背景与卡片设计</li>
            <li>响应式布局，适配移动端与桌面端</li>
            <li>优雅的文字排版与色彩搭配</li>
        </ul>

        <h2>代码示例</h2>
        <div class="highlight">
            <p>内嵌样式的写法：<br>
            <code>&lt;style&gt;</code> 标签中定义 <code>body</code>、<code>.container</code> 等选择器。</p>
        </div>

        <footer>
            &copy; 2025 示例页面 &middot; 使用 HTML5 + CSS3
        </footer>
    </div>
</body>
</html>
