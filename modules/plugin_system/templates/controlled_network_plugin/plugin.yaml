name: controlled_network_plugin
version: 1.0.0
description: Expert-only controlled HTTPS lookup through the host Gateway.
author: plugin-author
license: MIT

extensions:
  - type: tool
    name: fetch_status
    entry: src.main:fetch_status
    description: Fetch a bounded response from the approved example API through Gateway.
    params:
      path:
        type: string
        description: API path beginning with a slash.
        required: true
        minLength: 1
        maxLength: 120
      query:
        type: string
        description: Optional query string without secrets.
        required: false
        maxLength: 160
    returns:
      type: object
      required:
        - status_code
        - body
      properties:
        status_code:
          type: integer
          minimum: 100
          maximum: 599
        body:
          type: string
          maxLength: 2048
      additionalProperties: false
    permissions:
      - network.outbound:
          - url: https://api.example.com/*
            methods:
              - GET

permissions:
  - network.outbound:
      - url: https://api.example.com/*
        methods:
          - GET

runtime:
  mode: sub_process
  trust: third_party
  timeout_seconds: 8
  max_concurrency: 1
