name: read_only_memory_tool
version: 1.0.0
description: Read approved memory records for a bounded lookup query.
author: plugin-author
license: MIT

extensions:
  - type: tool
    name: read_memory_record
    entry: src.main:read_memory_record
    description: Read one approved memory record by key.
    params:
      key:
        type: string
        description: Memory key to read.
        required: true
        minLength: 1
        maxLength: 120
    returns:
      type: object
      required:
        - found
      properties:
        found:
          type: boolean
        value:
          type: string
          maxLength: 2048
      additionalProperties: false
    permissions:
      - memory.read: true

permissions:
  - memory.read: true

runtime:
  mode: sub_process
  trust: third_party
  timeout_seconds: 5
  max_concurrency: 1
