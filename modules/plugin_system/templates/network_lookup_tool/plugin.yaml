name: network_lookup_tool
version: 1.0.0
description: Fetch a small JSON or text response from an approved HTTPS endpoint.
author: plugin-author
license: MIT

extensions:
  - type: tool
    name: lookup_status
    entry: src.main:lookup_status
    description: Fetch a bounded response from the approved example API.
    params:
      path:
        type: string
        description: API path beginning with a slash.
        required: true
        minLength: 1
        maxLength: 120
    returns:
      type: object
      required:
        - status_code
        - body
      properties:
        status_code:
          type: integer
          minimum: 100
          maximum: 599
        body:
          type: string
          maxLength: 2048
      additionalProperties: false
    permissions:
      - network.outbound:
          - url: https://api.example.com/*
            methods:
              - GET

permissions:
  - network.outbound:
      - url: https://api.example.com/*
        methods:
          - GET

runtime:
  mode: sub_process
  trust: third_party
  timeout_seconds: 8
  max_concurrency: 1
