services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_backend
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - APP_ENV=production
      - LOG_LEVEL=INFO
      # API keys — override via .env or set here
      - LARGE_MODEL_API_KEY=${LARGE_MODEL_API_KEY:-}
      - LARGE_MODEL_API_URL=https://api.deepseek.com/v1/chat/completions
      - LARGE_MODEL_NAME=deepseek-v4-flash
      - MEDIUM_MODEL_API_KEY=${MEDIUM_MODEL_API_KEY:-}
      - MEDIUM_MODEL_API_URL=https://api.deepseek.com/v1/chat/completions
      - MEDIUM_MODEL_NAME=deepseek-v4-flash
      - SMALL_MODEL_API_KEY=${SMALL_MODEL_API_KEY:-}
      - SMALL_MODEL_API_URL=https://api.deepseek.com/v1/chat/completions
      - SMALL_MODEL_NAME=deepseek-v4-flash
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
