# 项目操作规范配置
#
# 【重要】这些规范是系统安全约束，AI 无法通过工具修改
# 用户/管理员可直接编辑此文件来调整规范
#
# 修改后的规范会在下一轮大模型处理时生效
# （不需要重启应用）

# ===========================
# 代码变更规范
# ===========================
代码变更: 提交前必须通过本地测试和 linting，遵循 git commit 规范

# ===========================
# 数据库修改规范
# ===========================
数据库修改: 数据库变更必须附带迁移脚本，不可直接修改生产数据

# ===========================
# API 接口变更规范
# ===========================
API变更: API 接口变更必须更新文档，确保向后兼容或明确指出破坏性变更

# ===========================
# 配置修改规范
# ===========================
配置修改: 生产环境配置修改需要 code review，不可在代码中硬编码

# ===========================
# 文件操作规范
# ===========================
文件操作: 操作文件时必须考虑权限、路径验证、异常处理

# ===========================
# 外部 API 调用规范
# ===========================
外部调用: 调用外部API必须考虑超时、重试、降级策略

# ===========================
# 日志记录规范
# ===========================
日志记录: 敏感操作必须记录审计日志，不可记录密钥等敏感信息

# ===========================
# 依赖更新规范
# ===========================
依赖更新: 更新依赖前必须检查兼容性，大版本更新需要详细测试

# ===========================
# 【可选】自定义规范
# ===========================
# 以下是自定义规范的示例，取消注释以启用

# 性能优化: 性能敏感代码必须进行基准测试，不可在无性能验证的情况下提交
# 文档: 新增公开 API 必须编写完整的文档和使用示例
# 测试覆盖: 新增代码的测试覆盖率不得低于 80%
